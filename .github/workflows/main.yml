name: Build Zygisk Module

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up Android NDK
        uses: nttld/setup-ndk@v3
        with:
          ndk-version: r27c
          local-cache: true

      - name: Build Module
        run: python build.py -t release zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: zygisk-module
          path: release/*.zip
